max_width = 80
hard_tabs = false
tab_spaces = 2
newline_style = "Auto"
indent_style = "Visual"
use_small_heuristics = "Max"
single_line_let_else_max_width = 80
wrap_comments = true
format_code_in_doc_comments = true
doc_comment_code_block_width = 80
comment_width = 80
normalize_comments = true
normalize_doc_attributes = true
format_strings = true
format_macro_matchers = true
format_macro_bodies = true
hex_literal_case = "Upper"
float_literal_trailing_zero = "Never"
empty_item_single_line = true
struct_lit_single_line = true
fn_single_line = true
where_single_line = true
imports_indent = "Visual"
imports_layout = "Vertical"
imports_granularity = "Crate"
group_imports = "StdExternalCrate"
reorder_imports = true
reorder_modules = true
reorder_impl_items = true
type_punctuation_density = "Compressed"
space_before_colon = false
space_after_colon = false
spaces_around_ranges = false
binop_separator = "Front"
remove_nested_parens = true
combine_control_expr = true
short_array_element_width_threshold = 80
overflow_delimited_expr = true
struct_field_align_threshold = 80
enum_discrim_align_threshold = 80
match_arm_blocks = false
match_arm_leading_pipes = "Always"
match_arm_indent = false
force_multiline_blocks = false
fn_params_layout = "Vertical"
brace_style = "PreferSameLine"
control_brace_style = "AlwaysSameLine"
trailing_semicolon = true
trailing_comma = "Always"
match_block_trailing_comma = true
blank_lines_upper_bound = 0
blank_lines_lower_bound = 0
edition = "2024"
inline_attribute_width = 80
merge_derives = true
use_try_shorthand = true
use_field_init_shorthand = true
force_explicit_abi = true
condense_wildcard_suffixes = true
color = "Auto"
unstable_features = true
skip_children = false
show_parse_errors = true
error_on_line_overflow = false
error_on_unformatted = false
